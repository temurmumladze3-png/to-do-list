<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="icon" type="image/png" href="./images/favicon-32x32.png" >
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barrio&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">

</head>
<body>
 
   
  <div class="main">
    
  <img class="img-main" src="./images/bg-desktop-dark.jpg" alt="">
  
  <div class="header">
    <h1 class="todo">TODO</h1>
    <img  id="theme-icon"  class="suun" src="./images/icon-sun.svg" alt="">
    
  </div>

    <div class="create-new">
        <div class="first">
        <div class="oval-copy">
           
        </div>
<input type="text" id="todo-input" placeholder="Create a new todo…">

</div>
    </div>

    <div class="Rectangle">
        <div class="column" id="todo-list">
            
         
         
        <div class="last">
            <p class="numbers"> items left</p>
            <div class="sas">
                <p class="all">All</p>
            <p>Active</p>
            <p>Completed</p>
            </div>
            
            <p class="clear" id="delete">Clear Completed</p>
        </div>
</div>
    </div>



  </div>









    <script src="script.js"></script>
</body>
</html>
